name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The full test suite runs on every supported Node across all three OSes.
  # orunmila has zero runtime deps, so `npm ci` only installs the c8 devdep.
  test:
    name: test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  # The coverage gate (c8 check-coverage in .c8rc.json) and the detection
  # accuracy gate are the two quality bars. They are deterministic on Linux;
  # we run them once on the primary OS/Node to keep the matrix fast and the
  # gates authoritative in one place.
  gates:
    name: coverage + accuracy gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (eslint flat config)
        run: npm run lint
      - name: Coverage gate (enforced thresholds in .c8rc.json)
        run: npm run coverage
      - name: Detection accuracy gate (>= 95% with the sentinel on)
        run: npm run accuracy:gate
